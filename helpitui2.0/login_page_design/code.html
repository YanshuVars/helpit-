<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Helpit Professional Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0f756d",
                        "background-light": "#f6f8f8",
                        "background-dark": "#112120",
                    },
                    fontFamily: {
                        "display": ["Newsreader", "serif"],
                        "sans": ["Inter", "system-ui", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .geometric-pattern {
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-sans text-slate-900 dark:text-slate-100 antialiased">
<main class="flex min-h-screen w-full flex-col lg:flex-row">
<!-- Left Branding Pane (45%) -->
<section class="relative flex w-full flex-col justify-between bg-primary p-8 lg:w-[45%] lg:p-16 overflow-hidden">
<!-- Decorative Pattern Overlay -->
<div class="absolute inset-0 geometric-pattern pointer-events-none"></div>
<!-- Content Container -->
<div class="relative z-10 flex flex-col items-start gap-8">
<!-- Brand Identity -->
<div class="flex flex-col gap-4">
<span class="material-symbols-outlined text-white text-7xl font-light">
                        diversity_1
                    </span>
<h1 class="font-display text-white text-5xl lg:text-6xl font-bold tracking-tight">
                        Helpit
                    </h1>
</div>
<p class="text-white/90 text-xl lg:text-2xl font-display italic">
                    Connecting India for Good
                </p>
</div>
<!-- Stats Bar -->
<div class="relative z-10 mt-20 lg:mt-0 pt-8 border-t border-white/20">
<div class="flex flex-wrap items-center gap-x-6 gap-y-2 text-white/80 text-sm font-medium tracking-wide">
<span>500+ NGOs</span>
<span class="h-1 w-1 rounded-full bg-white/40"></span>
<span>10k+ Volunteers</span>
<span class="h-1 w-1 rounded-full bg-white/40"></span>
<span>₹5Cr+ Raised</span>
</div>
</div>
</section>
<!-- Right Authentication Pane (55%) -->
<section class="flex w-full items-center justify-center bg-white dark:bg-background-dark p-8 lg:w-[55%] lg:p-16">
<div class="w-full max-w-md space-y-8">
<!-- Header -->
<div class="text-center lg:text-left">
<h2 class="font-display text-3xl font-bold text-slate-900 dark:text-slate-100">
                        Welcome Back
                    </h2>
<p class="mt-2 text-slate-500 dark:text-slate-400">
                        Sign in to your Helpit account
                    </p>
</div>
<!-- Form Section -->
<div class="space-y-6">
<!-- Google Auth -->
<button class="flex w-full items-center justify-center gap-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 px-4 py-2.5 text-sm font-semibold text-slate-700 dark:text-slate-200 transition-colors hover:bg-slate-50 dark:hover:bg-slate-700">
<svg class="h-5 w-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z" fill="#EA4335"></path>
</svg>
<span>Continue with Google</span>
</button>
<!-- Divider -->
<div class="relative flex items-center">
<div class="flex-grow border-t border-slate-200 dark:border-slate-700"></div>
<span class="mx-4 flex-shrink text-sm text-slate-400 uppercase tracking-wider">or</span>
<div class="flex-grow border-t border-slate-200 dark:border-slate-700"></div>
</div>
<!-- Email/Password Login -->
<form action="#" class="space-y-5" method="POST">
<div class="space-y-1.5">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-[20px]">
                                    mail
                                </span>
<input class="h-[44px] w-full rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 pl-10 pr-4 text-sm text-slate-900 dark:text-slate-100 placeholder:text-slate-400 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all" id="email" name="email" placeholder="name@organization.org" type="email"/>
</div>
</div>
<div class="space-y-1.5">
<div class="flex items-center justify-between">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300" for="password">Password</label>
<a class="text-xs font-semibold text-primary hover:underline" href="#">Forgot password?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-[20px]">
                                    lock
                                </span>
<input class="h-[44px] w-full rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 pl-10 pr-4 text-sm text-slate-900 dark:text-slate-100 placeholder:text-slate-400 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
</div>
<button class="w-full h-[44px] rounded-lg bg-primary text-white font-bold text-base transition-all hover:bg-opacity-90 active:scale-[0.98] shadow-sm" type="submit">
                            Sign In
                        </button>
</form>
<!-- Footer Link -->
<p class="text-center text-sm text-slate-600 dark:text-slate-400">
                        Don't have an account? 
                        <a class="font-bold text-primary hover:underline ml-1" href="#">Sign Up</a>
</p>
</div>
</div>
</section>
</main>
<!-- Background Images for context (hidden) -->

<img data-alt="Community outreach program with Indian volunteers" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBbuu8hotBrVXEJQURQv0Gup4lcwniZYIp6Vl21Lw1dL-n82pgXQVfqouV-u1x8n-59jYTgAyvPqgT5ZQn2MHYlDBqGLNb1ru7hsGNNY8Bh4dxM-iO6N4vVJRgeAPwVSoya0ZGuceJWAVLQ0LF67fMfTgjkbvYzF-IfT01E3DfkPzBMuTqNUbMTz2DXCZLMzxLfehCXVlGFDr79PM_5qOdXNcyuZKOG_Y7Ye8gAz5brZtwoft9Gy4QdVquz3ZUb-QdWh7kQJ_eyqMA"/>
</div>
</body></html>
