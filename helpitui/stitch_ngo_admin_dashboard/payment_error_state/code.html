<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Payment Error State - Helpit NGO</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec1313",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221010",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display">
<div class="relative mx-auto flex h-screen max-w-[430px] flex-col overflow-hidden bg-white dark:bg-background-dark shadow-2xl">
<!-- Top Navigation -->
<div class="flex items-center justify-end p-4">
<button class="flex size-10 items-center justify-center rounded-full bg-gray-100 dark:bg-white/10 text-gray-900 dark:text-white transition-colors hover:bg-gray-200">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</div>
<!-- Main Content Area -->
<div class="flex flex-1 flex-col items-center justify-center px-8 text-center">
<!-- Error Icon Section -->
<div class="mb-8 flex items-center justify-center">
<div class="relative">
<div class="absolute inset-0 scale-150 animate-pulse rounded-full bg-primary/10"></div>
<div class="relative flex h-24 w-24 items-center justify-center rounded-full bg-primary/20">
<div class="flex h-16 w-16 items-center justify-center rounded-full bg-primary text-white">
<span class="material-symbols-outlined text-4xl" data-icon="error">error</span>
</div>
</div>
</div>
</div>
<!-- Text Content -->
<div class="mb-12 flex flex-col gap-3">
<h1 class="text-2xl font-bold tracking-tight text-gray-900 dark:text-white">
                    Payment Unsuccessful
                </h1>
<p class="text-base leading-relaxed text-gray-600 dark:text-gray-400">
                    Something went wrong with your transaction. Please check your bank details or try again.
                </p>
</div>
<!-- Illustration / EmptyState Placeholder -->
<div class="mb-12 w-full max-w-[280px]">
<div class="aspect-square w-full rounded-2xl bg-gradient-to-br from-primary/5 to-primary/10 flex items-center justify-center border border-primary/10">
<span class="material-symbols-outlined text-primary/30 text-7xl" data-icon="credit_card_off">credit_card_off</span>
</div>
</div>
</div>
<!-- Actions Footer -->
<div class="flex flex-col gap-3 p-6 pb-10">
<!-- Primary Action -->
<button class="flex w-full items-center justify-center rounded-xl bg-primary h-14 text-white text-base font-bold transition-transform active:scale-95 shadow-lg shadow-primary/20">
<span class="truncate">Retry Payment</span>
</button>
<!-- Secondary Action -->
<button class="flex w-full items-center justify-center rounded-xl border-2 border-primary/20 dark:border-white/10 h-14 bg-transparent text-primary dark:text-primary text-base font-bold transition-colors hover:bg-primary/5 active:scale-95">
<span class="truncate">Contact Support</span>
</button>
</div>
<!-- Safe Area Indicator (iOS Style) -->
<div class="flex justify-center pb-2">
<div class="h-1.5 w-32 rounded-full bg-gray-300 dark:bg-white/20"></div>
</div>
</div>
</body></html>
