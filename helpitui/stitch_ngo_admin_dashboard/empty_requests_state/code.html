<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Empty Requests State - Helpit NGO</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2463eb",
                        "background-light": "#f6f6f8",
                        "background-dark": "#111621",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-fill {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col items-center justify-center">
<!-- iOS Phone Container Simulation -->
<div class="relative flex h-[844px] w-[390px] flex-col bg-white dark:bg-background-dark shadow-2xl overflow-hidden rounded-[3rem] border-[8px] border-slate-900 dark:border-slate-800">
<!-- Status Bar Spacer (iOS Style) -->
<div class="h-11 w-full bg-white dark:bg-background-dark"></div>
<!-- TopAppBar Component -->
<div class="flex items-center bg-white dark:bg-background-dark p-4 pb-2 justify-between border-b border-gray-100 dark:border-gray-800">
<div class="text-slate-900 dark:text-white flex size-12 shrink-0 items-center justify-start">
<span class="material-symbols-outlined">menu</span>
</div>
<h2 class="text-slate-900 dark:text-white text-lg font-bold leading-tight tracking-tight flex-1 text-center font-display">Requests</h2>
<div class="flex w-12 items-center justify-end">
<button class="flex cursor-pointer items-center justify-center rounded-xl h-10 w-10 bg-transparent text-slate-900 dark:text-white">
<span class="material-symbols-outlined">search</span>
</button>
</div>
</div>
<!-- Main Content Area - EmptyState Component -->
<div class="flex-1 flex flex-col items-center justify-center px-8 text-center bg-white dark:bg-background-dark">
<div class="flex flex-col items-center gap-8 w-full">
<!-- Illustration Placeholder (Soft-colored Clipboard) -->
<div class="relative flex items-center justify-center w-48 h-48 rounded-full bg-primary/5 dark:bg-primary/10">
<div class="absolute inset-0 flex items-center justify-center">
<div class="w-32 h-32 rounded-2xl bg-gradient-to-br from-primary/20 to-primary/5 flex items-center justify-center overflow-hidden border border-primary/10" data-alt="Soft blue stylized clipboard illustration for empty state">
<span class="material-symbols-outlined text-primary !text-7xl opacity-80">assignment_turned_in</span>
</div>
</div>
<!-- Decorative floating elements -->
<div class="absolute top-4 right-4 w-4 h-4 rounded-full bg-blue-200 dark:bg-blue-800 animate-pulse"></div>
<div class="absolute bottom-8 left-2 w-3 h-3 rounded-full bg-blue-100 dark:bg-blue-900"></div>
</div>
<div class="flex flex-col items-center gap-3">
<h3 class="text-slate-900 dark:text-white text-xl font-bold tracking-tight font-display">No active requests found</h3>
<p class="text-slate-500 dark:text-slate-400 text-sm font-normal leading-relaxed max-w-[280px]">
                        Start by creating a new help request for your community.
                    </p>
</div>
<!-- Primary CTA Button -->
<button class="flex w-full max-w-[280px] cursor-pointer items-center justify-center overflow-hidden rounded-xl h-14 px-6 bg-primary text-white text-base font-bold leading-normal tracking-wide shadow-lg shadow-primary/20 hover:bg-primary/90 transition-colors">
<span class="material-symbols-outlined mr-2">add_circle</span>
<span class="truncate">Create Request</span>
</button>
</div>
</div>
<!-- BottomNavBar Component -->
<div class="flex gap-2 border-t border-gray-100 dark:border-gray-800 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md px-4 pb-8 pt-2">
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined">home</span>
</div>
<p class="text-[10px] font-medium leading-normal tracking-wide">Home</p>
</a>
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-primary" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined material-symbols-fill">assignment</span>
</div>
<p class="text-[10px] font-semibold leading-normal tracking-wide">Requests</p>
</a>
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined">chat_bubble</span>
</div>
<p class="text-[10px] font-medium leading-normal tracking-wide">Messages</p>
</a>
<a class="flex flex-1 flex-col items-center justify-end gap-1 text-slate-400 dark:text-slate-500 hover:text-primary transition-colors" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined">account_circle</span>
</div>
<p class="text-[10px] font-medium leading-normal tracking-wide">Profile</p>
</a>
</div>
<!-- Home Indicator (iOS Style) -->
<div class="absolute bottom-1 left-1/2 -translate-x-1/2 w-32 h-1.5 bg-slate-900/20 dark:bg-white/20 rounded-full"></div>
</div>
</body></html>
