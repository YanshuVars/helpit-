<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2463eb",
                        "background-light": "#f6f6f8",
                        "background-dark": "#111621",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .ios-scrim { background-color: rgba(0,0,0,0.4); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col items-center justify-end">
<!-- Mock Background Content (Simulating the map/list behind) -->
<div class="absolute inset-0 z-0 opacity-40 grayscale pointer-events-none">
<div class="w-full h-full bg-[url('https://images.unsplash.com/photo-1524661135-423995f22d0b?q=80&amp;w=2074&amp;auto=format&amp;fit=crop')] bg-cover bg-center" data-alt="Abstract map background showing city streets"></div>
</div>
<!-- Bottom Sheet Container (80% Height) -->
<div class="relative z-10 w-full max-w-[480px] h-[85vh] bg-white dark:bg-gray-900 rounded-t-xl shadow-2xl flex flex-col overflow-hidden">
<!-- BottomSheetHandle -->
<div class="flex flex-col items-stretch bg-white dark:bg-gray-900 pt-3">
<button class="flex h-1.5 w-full items-center justify-center">
<div class="h-1.5 w-10 rounded-full bg-[#dbdee6] dark:bg-gray-700"></div>
</button>
</div>
<!-- TopAppBar -->
<div class="flex items-center bg-white dark:bg-gray-900 px-4 py-2 justify-between border-b border-gray-100 dark:border-gray-800">
<h2 class="text-[#111318] dark:text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1">Create Request</h2>
<div class="flex w-12 items-center justify-end">
<button class="flex cursor-pointer items-center justify-center rounded-full h-10 w-10 bg-gray-100 dark:bg-gray-800 text-[#111318] dark:text-white">
<span class="material-symbols-outlined" style="font-size: 20px;">close</span>
</button>
</div>
</div>
<!-- Scrollable Content -->
<div class="flex-1 overflow-y-auto no-scrollbar">
<!-- PageIndicators -->
<div class="flex w-full flex-row items-center justify-center gap-3 py-4">
<div class="h-1.5 w-8 rounded-full bg-primary"></div>
<div class="h-1.5 w-1.5 rounded-full bg-[#dbdee6] dark:bg-gray-700"></div>
<div class="h-1.5 w-1.5 rounded-full bg-[#dbdee6] dark:bg-gray-700"></div>
</div>
<!-- HeadlineText -->
<div class="px-4">
<h3 class="text-[#111318] dark:text-white tracking-tight text-2xl font-bold leading-tight pb-1">Basic Info</h3>
<p class="text-gray-500 dark:text-gray-400 text-sm">Step 1 of 3: Provide the essential details about your need.</p>
</div>
<!-- Form Fields -->
<div class="mt-4 space-y-2">
<!-- TextField: Title -->
<div class="px-4 py-2">
<label class="flex flex-col w-full">
<p class="text-[#111318] dark:text-gray-200 text-sm font-semibold pb-1.5">Request Title</p>
<input class="form-input flex w-full rounded-lg text-[#111318] dark:text-white border border-[#dbdee6] dark:border-gray-700 bg-white dark:bg-gray-800 focus:border-primary focus:ring-1 focus:ring-primary h-12 placeholder:text-[#616e89] px-4 text-base" placeholder="What do you need help with?" value=""/>
</label>
</div>
<!-- TextField: Description (Custom multiline) -->
<div class="px-4 py-2">
<label class="flex flex-col w-full">
<p class="text-[#111318] dark:text-gray-200 text-sm font-semibold pb-1.5">Description</p>
<textarea class="form-input flex w-full rounded-lg text-[#111318] dark:text-white border border-[#dbdee6] dark:border-gray-700 bg-white dark:bg-gray-800 focus:border-primary focus:ring-1 focus:ring-primary min-h-[100px] placeholder:text-[#616e89] p-4 text-base resize-none" placeholder="Explain the situation and what specific help is required..."></textarea>
</label>
</div>
<!-- Category Grid (Custom) -->
<div class="px-4 py-4">
<p class="text-[#111318] dark:text-gray-200 text-sm font-semibold pb-3">Category</p>
<div class="grid grid-cols-4 gap-3">
<button class="flex flex-col items-center justify-center p-3 rounded-xl border-2 border-primary bg-primary/10 text-primary">
<span class="material-symbols-outlined mb-1">medical_services</span>
<span class="text-[10px] font-bold">Medical</span>
</button>
<button class="flex flex-col items-center justify-center p-3 rounded-xl border border-gray-100 dark:border-gray-800 bg-gray-50 dark:bg-gray-800 text-gray-600 dark:text-gray-400">
<span class="material-symbols-outlined mb-1">restaurant</span>
<span class="text-[10px] font-bold">Food</span>
</button>
<button class="flex flex-col items-center justify-center p-3 rounded-xl border border-gray-100 dark:border-gray-800 bg-gray-50 dark:bg-gray-800 text-gray-600 dark:text-gray-400">
<span class="material-symbols-outlined mb-1">home</span>
<span class="text-[10px] font-bold">Shelter</span>
</button>
<button class="flex flex-col items-center justify-center p-3 rounded-xl border border-gray-100 dark:border-gray-800 bg-gray-50 dark:bg-gray-800 text-gray-600 dark:text-gray-400">
<span class="material-symbols-outlined mb-1">school</span>
<span class="text-[10px] font-bold">Education</span>
</button>
</div>
</div>
<!-- Urgency Level (Segmented Control) -->
<div class="px-4 py-4">
<p class="text-[#111318] dark:text-gray-200 text-sm font-semibold pb-3">Urgency Level</p>
<div class="flex p-1 bg-gray-100 dark:bg-gray-800 rounded-lg">
<button class="flex-1 py-2 text-xs font-semibold text-gray-500 dark:text-gray-400 rounded-md">Low</button>
<button class="flex-1 py-2 text-xs font-semibold bg-white dark:bg-gray-700 text-primary shadow-sm rounded-md">Medium</button>
<button class="flex-1 py-2 text-xs font-semibold text-gray-500 dark:text-gray-400 rounded-md">High</button>
<button class="flex-1 py-2 text-xs font-semibold text-gray-500 dark:text-gray-400 rounded-md">Critical</button>
</div>
</div>
</div>
<!-- Padding for footer -->
<div class="h-24"></div>
</div>
<!-- Sticky Footer Button -->
<div class="absolute bottom-0 left-0 right-0 p-4 bg-white/80 dark:bg-gray-900/80 backdrop-blur-md border-t border-gray-100 dark:border-gray-800">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg transition-all active:scale-[0.98] flex items-center justify-center gap-2">
<span>Next</span>
<span class="material-symbols-outlined" style="font-size: 18px;">arrow_forward</span>
</button>
</div>
</div>
</body></html>
