<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Helpit Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2463eb",
                        "background-light": "#f6f6f8",
                        "background-dark": "#111621",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex items-center justify-center font-display transition-colors duration-300">
<!-- Main Container - Fixed Mobile Form Factor -->
<div class="relative w-full max-w-[430px] min-h-[800px] bg-white dark:bg-background-dark overflow-hidden flex flex-col items-stretch px-6 py-8 shadow-2xl md:rounded-[3rem] border-x border-y border-gray-100 dark:border-gray-800">
<!-- Top App Bar Space -->
<div class="flex items-center justify-between pt-2 pb-6">
<button class="text-[#111318] dark:text-white p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800">
<span class="material-symbols-outlined">arrow_back_ios_new</span>
</button>
<h2 class="text-[#111318] dark:text-white text-lg font-bold leading-tight tracking-[-0.015em]">Login</h2>
<div class="w-10"></div> <!-- Spacer for centering title -->
</div>
<!-- Branding / Logo -->
<div class="flex flex-col items-center justify-center mt-4">
<div class="w-16 h-16 bg-primary rounded-xl flex items-center justify-center shadow-lg shadow-primary/30 mb-6">
<span class="material-symbols-outlined text-white text-4xl">volunteer_activism</span>
</div>
<h1 class="text-[#111318] dark:text-white tracking-light text-[32px] font-bold leading-tight text-center">Welcome Back</h1>
<p class="text-[#616e89] dark:text-gray-400 text-base font-normal leading-normal pt-2 text-center">Support your community today.</p>
</div>
<!-- Form Section -->
<div class="flex flex-col gap-1 mt-10">
<!-- Email Field -->
<div class="flex flex-col gap-2">
<p class="text-[#111318] dark:text-white text-sm font-medium leading-normal pl-1">Email Address</p>
<input class="form-input flex w-full rounded-xl text-[#111318] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-[#dbdee6] dark:border-gray-700 bg-white dark:bg-gray-800 h-14 placeholder:text-[#616e89] p-[15px] text-base font-normal" placeholder="Enter your email" type="email"/>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-2 mt-4">
<p class="text-[#111318] dark:text-white text-sm font-medium leading-normal pl-1">Password</p>
<div class="relative flex w-full">
<input class="form-input flex w-full rounded-xl text-[#111318] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-[#dbdee6] dark:border-gray-700 bg-white dark:bg-gray-800 h-14 placeholder:text-[#616e89] p-[15px] text-base font-normal" placeholder="Enter your password" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-[#616e89]">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Forgot Password -->
<div class="flex justify-end mt-2">
<a class="text-primary text-sm font-semibold hover:underline" href="#">Forgot password?</a>
</div>
<!-- Login Button -->
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl mt-8 shadow-lg shadow-primary/20 transition-all active:scale-[0.98]">
                Login
            </button>
</div>
<!-- Divider -->
<div class="flex items-center gap-4 my-8">
<div class="h-[1px] flex-1 bg-gray-200 dark:bg-gray-700"></div>
<span class="text-[#616e89] text-sm font-medium">Or continue with</span>
<div class="h-[1px] flex-1 bg-gray-200 dark:bg-gray-700"></div>
</div>
<!-- Social Buttons -->
<div class="flex flex-col gap-3">
<button class="w-full flex items-center justify-center gap-3 border border-[#dbdee6] dark:border-gray-700 bg-white dark:bg-gray-800 hover:bg-gray-50 dark:hover:bg-gray-700 h-14 rounded-xl transition-colors">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="text-[#111318] dark:text-white font-medium">Continue with Google</span>
</button>
<button class="w-full flex items-center justify-center gap-3 border border-[#dbdee6] dark:border-gray-700 bg-white dark:bg-gray-800 hover:bg-gray-50 dark:hover:bg-gray-700 h-14 rounded-xl transition-colors">
<svg class="w-5 h-5 fill-current text-[#111318] dark:text-white" viewbox="0 0 24 24">
<path d="M17.05 20.28c-.96.95-2.18 1.78-3.4 1.72-1.22-.06-1.78-.67-3.1-.67-1.33 0-1.94.67-3.1.67-1.16 0-2.4-.83-3.36-1.78-2.27-2.27-3.26-6.44-1.63-9.15.82-1.33 2.15-2.14 3.51-2.14.96 0 1.95.53 2.66.53.71 0 1.7-.53 2.66-.53 1.22 0 2.45.67 3.2 1.63-2.61 1.44-2.14 5.38.44 6.66-.53 1.33-1.22 2.61-1.88 3.51zM13.1 3.1c.88-1.05.77-2.66.11-3.1-.44.44-2.05.55-2.88 1.5-.83.94-.77 2.5.11 2.94.44-.33 1.94-.39 2.77-1.34z"></path>
</svg>
<span class="text-[#111318] dark:text-white font-medium">Continue with Apple</span>
</button>
</div>
<!-- Footer -->
<div class="mt-auto pt-8 pb-4 text-center">
<p class="text-[#616e89] dark:text-gray-400 text-sm">
                Don't have an account? 
                <a class="text-primary font-bold hover:underline" href="#">Sign up</a>
</p>
</div>
<!-- Floating Abstract Decoration (Background) -->
<div class="absolute -top-24 -right-24 w-64 h-64 bg-primary/5 rounded-full blur-3xl pointer-events-none"></div>
<div class="absolute -bottom-24 -left-24 w-64 h-64 bg-primary/10 rounded-full blur-3xl pointer-events-none"></div>
</div>
</body></html>
