<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Verification Success - Helpit</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ec49",
                        "background-light": "#f6f8f6",
                        "background-dark": "#102215",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen flex flex-col">
<div class="relative flex h-full min-h-screen w-full flex-col bg-white dark:bg-background-dark group/design-root overflow-x-hidden">
<!-- Top App Bar Space (iOS status bar mimic) -->
<div class="flex items-center bg-transparent p-4 pb-2 justify-end h-12">
<!-- Optional close or skip button if needed, left empty to focus on success -->
</div>
<div class="flex flex-col flex-1 justify-center items-center px-6">
<!-- Success Icon Section -->
<div class="flex items-center justify-center mb-10">
<div class="relative flex items-center justify-center w-32 h-32 rounded-full bg-primary/20">
<div class="flex items-center justify-center w-24 h-24 rounded-full bg-primary shadow-lg shadow-primary/40">
<span class="material-symbols-outlined text-white text-[64px]" data-icon="check_circle">check</span>
</div>
<!-- Decorative elements -->
<div class="absolute -top-4 -right-2 w-4 h-4 rounded-full bg-primary opacity-60"></div>
<div class="absolute bottom-2 -left-6 w-3 h-3 rounded-full bg-primary/40"></div>
</div>
</div>
<!-- Header Component -->
<h1 class="text-[#111813] dark:text-white tracking-light text-[32px] font-bold leading-tight text-center pb-3 pt-6">
                Account Verified!
            </h1>
<!-- Body Text Component -->
<p class="text-[#111813] dark:text-gray-300 text-base font-normal leading-normal pb-8 pt-1 px-4 text-center max-w-[320px]">
                Your email has been confirmed. You can now access all features of the Helpit platform.
            </p>
<!-- Abstract Background Graphic (Invisible but used to meet component style requirements if needed via bg-image) -->
<div class="hidden w-full h-2 bg-center bg-no-repeat bg-cover" data-alt="abstract green celebration confetti pattern"></div>
</div>
<!-- Footer / Action Area -->
<div class="flex flex-col px-6 py-8 gap-4 mb-4">
<!-- Single Button Component -->
<div class="flex w-full">
<button class="flex min-w-[84px] w-full max-w-[480px] cursor-pointer items-center justify-center overflow-hidden rounded-xl h-14 px-5 flex-1 bg-primary text-[#111813] text-base font-bold leading-normal tracking-[0.015em] transition-transform active:scale-95">
<span class="truncate">Go to Dashboard</span>
</button>
</div>
<!-- Subtle secondary hint -->
<p class="text-sm text-center text-gray-500 dark:text-gray-400">
                Redirecting in 5 seconds...
            </p>
</div>
<!-- iOS Home Indicator Spacing -->
<div class="h-5 bg-white dark:bg-background-dark"></div>
</div>
</body></html>
